<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Click &amp; Copy</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 16px 20px;
      width: 260px;
      background: #fff;
      color: #1a1a1a;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      background: #22c55e;
      color: #fff;
      border-radius: 4px;
      padding: 2px 6px;
    }

    p.subtitle {
      font-size: 12px;
      color: #666;
      margin: 0 0 14px;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    li {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      background: #f0fdf4;
      border-radius: 4px;
      font-size: 11px;
    }

    footer {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid #f0f0f0;
      font-size: 10px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Click &amp; Copy <span class="badge">actif</span></h1>
  <p class="subtitle">Fonctionne sur tous les sites, dans tous les cadres.</p>

  <ul>
    <li><span class="icon">🖱️</span> Clic droit restauré</li>
    <li><span class="icon">📝</span> Sélection de texte restaurée</li>
    <li><span class="icon">📋</span> Copier / Coller restaurés</li>
  </ul>

  <footer>Aucune permission · Manifest V3</footer>
</body>
</html>
