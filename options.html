<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title data-i18n="optionsTitle"></title>
  <link rel="stylesheet" href="options.css">
</head>
<body>

  <header>
    <h1>Click &amp; Copy</h1>
    <p class="subtitle" data-i18n="subtitle"></p>
  </header>

  <main>

    <!-- Global toggle -->
    <section class="card card--global">
      <div class="toggle-row">
        <div>
          <span class="toggle-label" data-i18n="enableForAllSites"></span>
          <span class="toggle-hint" id="global-hint" data-i18n="disabledByDefault"></span>
        </div>
        <label class="switch">
          <input type="checkbox" id="global-toggle">
          <span class="track"><span class="thumb"></span></span>
        </label>
      </div>
    </section>

    <!-- Rules -->
    <section>
      <h2 data-i18n="exceptions"></h2>
      <div class="card" id="rules-card">
        <ul class="rules-list" id="rules-list">
          <li class="empty" data-i18n="noExceptions"></li>
        </ul>
      </div>
    </section>

    <!-- Detected -->
    <section>
      <h2 data-i18n="detectedSites"></h2>
      <div class="card" id="detected-card">
        <ul class="detected-list" id="detected-list">
          <li class="empty" data-i18n="noDetectedSites"></li>
        </ul>
      </div>
    </section>

  </main>

  <script src="options.js"></script>
</body>
</html>
