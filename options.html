<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Click & Copy – Options</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 16px;
      color: #1a1a1a;
      background: #f8f9fa;
    }
    h1 { font-size: 22px; margin-bottom: 24px; }
    h2 { font-size: 15px; color: #555; text-transform: uppercase; letter-spacing: .5px; margin: 24px 0 12px; }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    /* Toggle switch */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-row label { font-size: 15px; font-weight: 500; }
    .switch {
      position: relative; width: 44px; height: 24px; cursor: pointer;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: #ccc; border-radius: 24px; transition: .2s;
    }
    .slider::before {
      content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%; transition: .2s;
    }
    .switch input:checked + .slider { background: #22c55e; }
    .switch input:checked + .slider::before { transform: translateX(20px); }

    /* Rules list */
    .rules-list { list-style: none; }
    .rules-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }
    .rules-list li:last-child { border-bottom: none; }
    .rule-target {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 12px;
    }
    .rule-target .type {
      display: inline-block;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 4px;
      margin-right: 6px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .type-site { background: #e0f2fe; color: #0369a1; }
    .type-page { background: #fef3c7; color: #92400e; }
    .rule-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .state-on { color: #16a34a; font-weight: 600; font-size: 12px; }
    .state-off { color: #dc2626; font-weight: 600; font-size: 12px; }

    button.remove {
      background: none; border: none; cursor: pointer; color: #999; font-size: 18px; line-height: 1;
      padding: 2px 6px; border-radius: 4px;
    }
    button.remove:hover { background: #fee2e2; color: #dc2626; }

    .empty { color: #999; font-size: 14px; font-style: italic; padding: 8px 0; }

    /* Detected list */
    .detected-list { list-style: none; }
    .detected-list li {
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
      color: #555;
    }
    .detected-list li:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <h1>Click &amp; Copy</h1>

  <div class="card">
    <div class="toggle-row">
      <label for="global-toggle">Activer pour tous les sites</label>
      <label class="switch">
        <input type="checkbox" id="global-toggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <h2>Règles par site et par page</h2>
  <div class="card">
    <ul class="rules-list" id="rules-list">
      <li class="empty">Aucune règle configurée</li>
    </ul>
  </div>

  <h2>Sites avec blocage détecté</h2>
  <div class="card">
    <ul class="detected-list" id="detected-list">
      <li class="empty">Aucun site détecté</li>
    </ul>
  </div>

  <script src="options.js"></script>
</body>
</html>
