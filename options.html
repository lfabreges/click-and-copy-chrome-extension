<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Click & Copy – Options</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>

  <header>
    <h1>Click &amp; Copy</h1>
    <p class="subtitle">Restaure le clic droit, la sélection de texte et le copier-coller.</p>
  </header>

  <main>

    <!-- Global toggle -->
    <section class="card card--global">
      <div class="toggle-row">
        <div>
          <span class="toggle-label">Activer pour tous les sites</span>
          <span class="toggle-hint" id="global-hint">Désactivé par défaut</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="global-toggle">
          <span class="track"><span class="thumb"></span></span>
        </label>
      </div>
    </section>

    <!-- Rules -->
    <section>
      <h2>Exceptions</h2>
      <div class="card" id="rules-card">
        <ul class="rules-list" id="rules-list">
          <li class="empty">Aucune exception configurée</li>
        </ul>
      </div>
    </section>

    <!-- Detected -->
    <section>
      <h2>Sites avec blocage détecté</h2>
      <div class="card" id="detected-card">
        <ul class="detected-list" id="detected-list">
          <li class="empty">Aucun site détecté pour le moment</li>
        </ul>
      </div>
    </section>

  </main>

  <script src="options.js"></script>
</body>
</html>
